name: grobid_dataset_annotate
owner: bgruening
description: Identify dataset mentions in scientific articles with DataStet
long_description: |
  Galaxy wrapper for the GROBID DataStet service. The tool starts the DataStet
  web service inside the job container and annotates dataset mentions in PDF or
  TEI scientific articles.
