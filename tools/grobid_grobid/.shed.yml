name: grobid_grobid
owner: bgruening
description: Extract structured TEI XML from scholarly documents and patents with GROBID
long_description: |
  Galaxy wrapper for GROBID service-based document processing. The tool starts
  the GROBID web service inside the job container and returns TEI XML for
  scientific article PDFs and patent citation extraction inputs.
