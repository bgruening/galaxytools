name: kat
owner: bgruening
description: KAT (K-mer Analysis Toolkit) for quality control of NGS datasets and genome assemblies.
long_description: |
  KAT (K-mer Analysis Toolkit) provides tools to quality control NGS datasets and genome assemblies
  using k-mer frequency analysis. It includes tools for generating k-mer histicity plots, comparing
  k-mer spectra between datasets, filtering sequences by k-mer content, and analysing GC/coverage
  distributions.
homepage_url: https://github.com/TGAC/KAT
remote_repository_url: https://github.com/bgruening/galaxytools/tree/master/tools/kat
type: unrestricted
categories:
  - Sequence Analysis
  - Assembly
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "Wrapper for {{ tool_name }} from the KAT toolkit."
suite:
  name: "suite_kat"
  description: "A suite of Galaxy wrappers for the KAT (K-mer Analysis Toolkit)."
  long_description: |
    KAT (K-mer Analysis Toolkit) provides a suite of tools for quality control of NGS datasets
    and genome assemblies using k-mer frequency analysis.
  type: repository_suite_definition
  maintainers:
  - SaimMomin12
